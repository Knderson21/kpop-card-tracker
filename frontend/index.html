<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/FaviconLogo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KPop Collect</title>
    <script>
      // Restore the real path from the 404.html SPA redirect.
      (function () {
        if (window.location.search.indexOf('?/') === 0 || window.location.search.indexOf('&/') > 0) {
          var q = window.location.search.slice(1).split('&').map(function (p) { return p.replace(/~and~/g, '&'); });
          var path = q.shift().slice(1);
          window.history.replaceState(
            null, '',
            window.location.pathname.replace(/\/$/, '') + '/' + path +
            (q.length ? '?' + q.join('&') : '') +
            window.location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
