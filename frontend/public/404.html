<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>KPop Collect</title>
    <script>
      // SPA fallback for GitHub Pages: rewrite /segment/path to /?/segment/path
      // so the root index.html can restore it with history.replaceState.
      // Adapted from https://github.com/rafgraph/spa-github-pages (MIT).
      (function () {
        var pathSegmentsToKeep = 1; // keep "/kpop-card-tracker"
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
